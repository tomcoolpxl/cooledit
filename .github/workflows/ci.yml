name: CI

on:
  push:
    branches: ["main"]
    tags-ignore: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go: ["1.25.x"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: go build -o /dev/null ./cmd/cooledit

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: go build -o NUL ./cmd/cooledit
