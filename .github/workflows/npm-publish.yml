name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish to npm (for example v0.5.1)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm CLI
        run: npm install --global npm@latest

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "Release tag must start with v, got: $TAG" >&2
              exit 1
              ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set package version from release tag
        run: npm version --no-git-tag-version "${RELEASE_TAG#v}"
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}

      - name: Publish package
        run: npm publish --access public --provenance
